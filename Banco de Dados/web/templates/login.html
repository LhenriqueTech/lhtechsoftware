{% extends "base.html" %}
{% block title %}Login — LH TECH{% endblock %}
{% block body_class %}login-page{% endblock %}

{% block content %}
<div class="login-container">
    <div class="login-card">
        <div class="login-header">
            <img src="/static/logo.png" alt="LH TECH" class="login-logo">
            <h1>LH TECH</h1>
            <p class="login-subtitle">Sistema de Relatórios</p>
        </div>

        <form method="POST" class="login-form" autocomplete="on">
            <div class="form-group">
                <label for="username">
                    <span class="material-icons-round">person</span>
                    Usuário
                </label>
                <input type="text" id="username" name="username" class="form-input"
                       placeholder="Digite seu usuário" required autofocus autocomplete="username">
            </div>

            <div class="form-group">
                <label for="password">
                    <span class="material-icons-round">lock</span>
                    Senha
                </label>
                <input type="password" id="password" name="password" class="form-input"
                       placeholder="Digite sua senha" required autocomplete="current-password">
            </div>

            <button type="submit" class="btn btn-primary btn-block" id="btn-login">
                <span class="material-icons-round">login</span>
                Entrar
            </button>
        </form>

        <div class="login-footer">
            <span>LH TECH &copy; 2026</span>
        </div>
    </div>
</div>
{% endblock %}
